
services:
  pd:
    image: pingcap/pd:v7.5.0
    command:
      - --name=pd
      - --data-dir=/pd/data
      - --client-urls=http://0.0.0.0:2379
      - --peer-urls=http://0.0.0.0:2380
      - --initial-cluster=pd=http://pd:2380
      - --advertise-client-urls=http://pd:2379
      - --advertise-peer-urls=http://pd:2380
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - pd-data:/pd/data
    networks:
      - helfy-net

  tikv:
    image: pingcap/tikv:v7.5.0
    command:
      - --pd=http://pd:2379
      - --data-dir=/tikv/data
      - --addr=0.0.0.0:20160
      - --advertise-addr=tikv:20160
      - --status-addr=0.0.0.0:20180
      - --advertise-status-addr=tikv:20180
    depends_on:
      - pd
    ports:
      - "20160:20160"
      - "20180:20180"
    volumes:
      - tikv-data:/tikv/data
    networks:
      - helfy-net

  tidb:
    image: pingcap/tidb:v7.5.0
    command:
      - tidb-server
      - --store=tikv
      - --path=pd:2379
      - --log.file.filename=/tmp/tidb.log
    ports:
      - "4000:4000"
      - "10080:10080"
    depends_on:
      - pd
      - tikv
    networks:
      - helfy-net

  db-init:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      - tidb
    env_file:
      - .env
    command: node db-init.js
    restart: 'no'
    networks:
      - helfy-net

  kafka-1:
    image: apache/kafka:latest
    environment:
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_NODE_ID=1
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-1:9093,2@kafka-2:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka-1:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_DEFAULT_REPLICATION_FACTOR=2
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=2
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=2
      - KAFKA_NUM_PARTITIONS=1
    ports:
      - "9092:9092"
    volumes:
      - kafka-1-data:/var/lib/kafka/data
    networks:
      - helfy-net

  kafka-2:
    image: apache/kafka:latest
    environment:
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_NODE_ID=2
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-1:9093,2@kafka-2:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka-2:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_DEFAULT_REPLICATION_FACTOR=2
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=2
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=2
      - KAFKA_NUM_PARTITIONS=1
    ports:
      - "9093:9092"
    volumes:
      - kafka-2-data:/var/lib/kafka/data
    networks:
      - helfy-net

  ticdc:
    image: pingcap/ticdc:v7.5.0
    depends_on:
      pd:
        condition: service_started
      tikv:
        condition: service_started
      tidb:
        condition: service_started
      kafka-1:
        condition: service_started
      kafka-2:
        condition: service_started
      db-init:
        condition: service_completed_successfully
    restart: on-failure
    command: >
      sh -c "/cdc server --pd=http://pd:2379 --addr=0.0.0.0:8300 --advertise-addr=ticdc:8300 --log-level=info --log-file=/tmp/ticdc.log --data-dir=/tmp/cdc-data &
             until /cdc cli changefeed list --pd=http://pd:2379 >/dev/null 2>&1; do echo 'Waiting for TiCDC server...'; sleep 3; done;
             if /cdc cli changefeed query --pd=http://pd:2379 --changefeed-id=helfy-cdc >/dev/null 2>&1; then echo 'TiCDC changefeed helfy-cdc already exists.';
             else until /cdc cli changefeed create --pd=http://pd:2379 --config=/etc/ticdc/changefeed.toml --sink-uri='kafka://kafka-1:9092,kafka-2:9092/db-changes?protocol=canal-json' --changefeed-id=helfy-cdc; do echo 'Waiting to create TiCDC Kafka changefeed...'; sleep 5; done; fi;
             wait"
    ports:
      - "8300:8300"
    volumes:
      - ./ticdc-changefeed.toml:/etc/ticdc/changefeed.toml:ro
    networks:
      - helfy-net

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: sh -c "sleep 25 && node server.js"
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      tidb:
        condition: service_started
      kafka-1:
        condition: service_started
      kafka-2:
        condition: service_started
      ticdc:
        condition: service_started
      db-init:
        condition: service_completed_successfully
    networks:
      - helfy-net

  consumer:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: sh -c "sleep 30 && node consumer.js"
    env_file:
      - .env
    depends_on:
      - kafka-1
      - kafka-2
      - ticdc
    networks:
      - helfy-net

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - helfy-net

volumes:
  pd-data:
  tikv-data:
  kafka-1-data:
  kafka-2-data:

networks:
  helfy-net:
    driver: bridge
