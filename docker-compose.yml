
services:
  pd:
    image: pingcap/pd:v7.5.0
    command:
      - --name=pd
      - --data-dir=/pd/data
      - --client-urls=http://0.0.0.0:2379
      - --peer-urls=http://0.0.0.0:2380
      - --initial-cluster=pd=http://pd:2380
      - --advertise-client-urls=http://pd:2379
      - --advertise-peer-urls=http://pd:2380
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - pd-data:/pd/data
    networks:
      - helfy-net

  tikv:
    image: pingcap/tikv:v7.5.0
    command:
      - --pd=http://pd:2379
      - --data-dir=/tikv/data
    depends_on:
      - pd
    ports:
      - "20160:20160"
    volumes:
      - tikv-data:/tikv/data
    networks:
      - helfy-net

  tidb:
    image: pingcap/tidb:v7.5.0
    command:
      - tidb-server
      - --store=tikv
      - --path=pd:2379
      - --log.file.filename=/tmp/tidb.log
    ports:
      - "4000:4000"
      - "10080:10080"
    depends_on:
      - pd
      - tikv
    networks:
      - helfy-net

  mysql-init:
    image: mysql:8.0
    depends_on:
      - tidb
    environment:
      - MYSQL_ALLOW_EMPTY_PASSWORD=yes
    command: >
      sh -c "until mysql -h tidb -P 4000 -u root -e 'CREATE DATABASE IF NOT EXISTS helfy_app;'; do echo 'Waiting for TiDB to create database...'; sleep 3; done; echo 'Database helfy_app is ready.'"
    restart: 'no'
    networks:
      - helfy-net

  kafka-1:
    image: apache/kafka:latest
    environment:
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_NODE_ID=1
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-1:9093,2@kafka-2:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka-1:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    ports:
      - "9092:9092"
    volumes:
      - kafka-1-data:/var/lib/kafka/data
    networks:
      - helfy-net

  kafka-2:
    image: apache/kafka:latest
    environment:
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_NODE_ID=2
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-1:9093,2@kafka-2:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka-2:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    ports:
      - "9093:9092"
    volumes:
      - kafka-2-data:/var/lib/kafka/data
    networks:
      - helfy-net

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: sh -c "sleep 25 && node server.js"
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - tidb
      - mysql-init
      - kafka-1
      - kafka-2
    networks:
      - helfy-net

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - helfy-net

volumes:
  pd-data:
  tikv-data:
  kafka-1-data:
  kafka-2-data:

networks:
  helfy-net:
    driver: bridge
